services:
  - type: web
    name: cybercypher-api
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt && pip install pgmpy --no-deps && MPLBACKEND=Agg MPLCONFIGDIR=/opt/render/project/.matplotlib python -c "import matplotlib.font_manager"
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MPLBACKEND
        value: Agg
      - key: MPLCONFIGDIR
        value: /opt/render/project/.matplotlib
      - key: OPENAI_API_KEY
        sync: false
